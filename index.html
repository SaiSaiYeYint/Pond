<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pond</title>
<style>
:root{--deep:#061817;--mid:#0a2e2b;--shallow:#15594f;--ink:#f7fbf8;--muted:rgba(247,251,248,.66);--line:rgba(255,255,255,.12);--paper:#fffdf5;--paperText:#151713;--gold:#f2c14e;--red:#ff5145;--shadow:0 24px 70px rgba(0,0,0,.44)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#030706;color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input{font:inherit}button{cursor:pointer}.stage{min-height:100vh;display:grid;place-items:center;padding:18px;background:radial-gradient(circle at 18% 12%,rgba(242,193,78,.13),transparent 28%),radial-gradient(circle at 85% 82%,rgba(112,208,175,.11),transparent 34%),#030706}.phone{width:min(430px,100%);height:min(900px,96vh);min-height:720px;position:relative;overflow:hidden;border-radius:34px;background:var(--deep);box-shadow:var(--shadow),inset 0 0 0 1px rgba(255,255,255,.12);display:grid;grid-template-rows:auto 1fr}.pond{position:absolute;inset:0;z-index:0;background:radial-gradient(circle at 50% 22%,#1b6b60,var(--mid) 48%,var(--deep));}.pond canvas{width:100%;height:100%;display:block}.waterGlow{position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(circle at 14% 16%,rgba(255,238,182,.22),transparent 35%),radial-gradient(circle at 80% 75%,rgba(170,238,219,.1),transparent 42%),linear-gradient(180deg,rgba(255,255,255,.06),transparent 34%,rgba(0,0,0,.22));mix-blend-mode:screen}.top{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px}.pill{border:1px solid var(--line);background:rgba(3,10,9,.62);color:var(--ink);backdrop-filter:blur(18px);border-radius:999px;min-height:40px;padding:0 13px;font-size:13px;font-weight:850;box-shadow:0 10px 28px rgba(0,0,0,.24)}.brandPill{display:grid;place-items:center}.coinPill{color:var(--gold);display:flex;align-items:center;gap:7px}.hudRight{display:flex;align-items:center;gap:8px}.quietToggle{border:1px solid var(--line);background:rgba(3,10,9,.34);color:var(--ink);border-radius:999px;min-height:40px;width:40px;font-weight:900}.coinIcon,.trophyIcon{width:22px;height:22px;display:inline-grid;place-items:center;position:relative;flex:0 0 auto}.coinIcon{border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff4b8,#f2c14e 42%,#a66d15);box-shadow:inset 0 0 0 2px rgba(255,255,255,.22),0 0 14px rgba(242,193,78,.24)}.coinIcon:after{content:"";width:8px;height:8px;border-radius:50%;border:2px solid rgba(80,48,5,.5)}.trophyIcon:before{content:"";width:16px;height:13px;border-radius:4px 4px 7px 7px;background:linear-gradient(#ffe08a,#c58a19);box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}.trophyIcon:after{content:"";position:absolute;bottom:2px;width:18px;height:4px;border-radius:4px;background:#a66d15;box-shadow:0 -5px 0 -1px #c58a19}.screens{position:relative;z-index:4;min-height:0}.screen{position:absolute;inset:0;padding:8px 18px 22px;display:flex;flex-direction:column;gap:15px;transition:opacity .22s ease,transform .22s ease}.screen.hidden{opacity:0;transform:translateY(10px) scale(.98);pointer-events:none}.heroCopy{padding-top:6px;text-shadow:0 2px 14px rgba(0,0,0,.55)}h1{font-size:28px;line-height:1;margin:0 0 6px;letter-spacing:0}.sub{margin:0;color:var(--muted);font-size:14px;line-height:1.4}.doneForm{display:grid;grid-template-columns:1fr auto;gap:8px;background:rgba(3,10,9,.58);border:1px solid rgba(255,255,255,.09);border-radius:18px;padding:7px;backdrop-filter:blur(18px);box-shadow:0 14px 38px rgba(0,0,0,.28)}input{min-width:0;border:0;outline:0;border-radius:13px;background:transparent;color:var(--ink);padding:11px 10px;font-size:14px}input::placeholder{color:rgba(247,251,248,.42)}.send,.ghost{border:0;border-radius:13px;min-height:42px;padding:0 15px;font-weight:900}.send{background:var(--paper);color:var(--paperText)}.ghost{background:rgba(255,255,255,.08);color:var(--ink);border:1px solid var(--line)}.week{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;border:1px solid var(--line);border-radius:18px;padding:12px;background:rgba(3,10,9,.38);backdrop-filter:blur(16px)}.day{display:grid;gap:5px;justify-items:center;color:rgba(247,251,248,.48);font-size:11px;font-weight:800}.dot{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:transparent;font-weight:1000;font-size:15px;line-height:1}.day.done{color:var(--ink)}.day.done .dot{background:var(--gold);border-color:var(--gold);color:#111;text-shadow:0 1px 0 rgba(255,255,255,.18)}.panel{border:1px solid var(--line);border-radius:18px;background:rgba(3,10,9,.44);backdrop-filter:blur(18px);box-shadow:0 12px 34px rgba(0,0,0,.16)}.panelHead{display:flex;align-items:center;justify-content:space-between;padding:13px 14px 0}.panelHead h2{margin:0;font-size:14px}.list{display:grid;gap:4px;padding:8px 10px 10px;overflow:auto;height:190px;max-height:190px;scrollbar-width:none;align-content:start}.empty{color:var(--muted);font-size:13px;border:1px dashed var(--line);border-radius:14px;padding:12px}.doneCard{display:grid;grid-template-columns:minmax(0,1fr)46px;gap:7px;align-items:center;min-height:30px;border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.08);padding:4px 7px 4px 9px}.doneLine{min-width:0;font-size:12px;font-weight:720;line-height:1.18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--ink)}.bonus{height:24px;display:grid;place-items:center;font-size:15px;font-weight:1000;letter-spacing:0;text-align:center;color:var(--gold);text-shadow:0 0 10px rgba(242,193,78,.2)}.bonus.bad{color:#ff8278;text-shadow:0 0 16px rgba(255,81,69,.18)}.bonus.zero{color:var(--muted);text-shadow:none}.pondHint{margin:auto 0 0;text-align:center;color:rgba(247,251,248,.72);text-shadow:0 2px 12px rgba(0,0,0,.55);font-size:13px;line-height:1.6;letter-spacing:.6px}.pondStats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.pondStat{border:1px solid var(--line);border-radius:18px;background:rgba(3,10,9,.52);backdrop-filter:blur(16px);padding:13px}.pondStat span{display:block;color:var(--muted);font-size:12px}.pondStat strong{font-size:24px}.anchor{position:absolute;right:18px;bottom:18px;z-index:9;display:flex;flex-direction:column;align-items:flex-end;gap:9px}.speech{max-width:260px;border:1px solid rgba(255,255,255,.62);background:var(--paper);color:var(--paperText);border-radius:18px 18px 6px 18px;padding:10px 12px;font-size:13px;font-weight:760;line-height:1.34;box-shadow:0 14px 34px rgba(0,0,0,.3);text-align:left;animation:pop .18s ease}.speech.hidden{display:none}@keyframes pop{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}.chat{width:min(334px,calc(100vw - 58px));max-height:420px;background:var(--paper);color:var(--paperText);border-radius:22px;box-shadow:0 22px 54px rgba(0,0,0,.42);overflow:hidden;border:1px solid rgba(255,255,255,.65);display:none}.chat.open{display:block}.chat.open+.speech{display:none}.chatHead{display:none}.log{height:270px;overflow:auto;padding:13px;display:flex;flex-direction:column;gap:8px;background:#f2f4ed;scrollbar-width:none}.list::-webkit-scrollbar,.log::-webkit-scrollbar{display:none}.bubble{max-width:88%;border-radius:15px;padding:9px 12px;font-size:13px;line-height:1.38}.bubble.g{align-self:flex-start;background:#dfe6df}.bubble.u{align-self:flex-end;background:#101614;color:var(--ink)}.chatForm{display:grid;grid-template-columns:1fr auto;gap:7px;padding:10px;background:var(--paper);border-top:1px solid #dfe5dd}.chatForm input{color:var(--paperText);background:#f6f6ef;border:1px solid #dfe5dd}.orb{width:58px;height:58px;border-radius:50%;background:#030605;border:1px solid rgba(255,255,255,.14);box-shadow:0 12px 32px rgba(0,0,0,.42);display:grid;place-items:center;position:relative}.orb:before{content:"";width:23px;height:7px;border-radius:999px;background:var(--gold);box-shadow:0 0 15px rgba(242,193,78,.9)}.orb.talk:before{height:19px;border-radius:50%;animation:stare .22s infinite alternate}.badge{position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:var(--red);display:none;box-shadow:0 0 12px var(--red)}@keyframes stare{from{transform:translateX(-1px) scale(1)}to{transform:translateX(1px) scale(1.08)}}.float{position:absolute;z-index:8;color:var(--gold);font-weight:1000;text-shadow:0 2px 8px #000;pointer-events:none;animation:rise 1.1s forwards}@keyframes rise{0%{opacity:0;transform:translateY(0) scale(.8)}20%{opacity:1}100%{opacity:0;transform:translateY(-54px) scale(.95)}}@media(max-width:480px){.stage{padding:0}.phone{height:100vh;min-height:100vh;border-radius:0}.top{padding:13px}.screen{padding:6px 14px 18px}h1{font-size:25px}.chat{width:calc(100vw - 34px)}.anchor{right:14px;bottom:14px}.list{max-height:185px}}
.bottomComposer{position:absolute;left:86px;right:16px;bottom:calc(18px + var(--keyboard-lift,0px));z-index:10;margin:0;grid-template-columns:minmax(0,1fr)52px;border-radius:20px;background:rgba(3,10,9,.68);box-shadow:0 18px 46px rgba(0,0,0,.38);padding:6px;transform-origin:bottom right}.bottomComposer input{min-height:46px;padding:11px 9px}.bottomComposer .send{min-width:52px;padding:0;border-radius:15px}.bottomComposer.thinking{opacity:.82}.bottomComposer.thinking .send{color:transparent;position:relative}.bottomComposer.thinking .send:after{content:"";position:absolute;inset:15px;margin:auto;width:12px;height:12px;border-radius:50%;border:2px solid rgba(20,23,19,.28);border-top-color:#151713;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.quickThread{position:absolute;left:86px;right:16px;bottom:calc(84px + var(--keyboard-lift,0px));z-index:10;display:flex;flex-direction:column;gap:7px;align-items:stretch;pointer-events:none}.quickThread.hidden{display:none}.quickThread.leaving .quickBubble.u{animation:bubbleOut .9s ease forwards}.quickThread.leaving .quickBubble.g{animation:bubbleOut .9s ease .48s forwards}.quickBubble{max-width:92%;padding:9px 12px;border-radius:17px;font-size:13px;font-weight:760;line-height:1.32;box-shadow:0 13px 36px rgba(0,0,0,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.quickBubble.u{align-self:flex-end;background:#101614;color:var(--ink);border-bottom-right-radius:6px;transform-origin:bottom right;animation:userBubbleIn .34s cubic-bezier(.18,.9,.22,1)}.quickBubble.g{align-self:flex-start;background:var(--paper);color:var(--paperText);border-bottom-left-radius:6px;transform-origin:bottom left;animation:grimmBubbleIn .3s cubic-bezier(.18,.9,.22,1)}.quickBubble.typing{width:58px;color:transparent;position:relative}.quickBubble.typing:before{content:"";position:absolute;left:13px;top:50%;width:6px;height:6px;border-radius:50%;background:#151713;box-shadow:12px 0 0 rgba(21,23,19,.6),24px 0 0 rgba(21,23,19,.35);animation:typingDots 1s infinite ease-in-out;transform:translateY(-50%)}@keyframes userBubbleIn{from{opacity:0;transform:translateY(46px) scale(.78)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes grimmBubbleIn{from{opacity:0;transform:translateX(-12px) translateY(10px) scale(.88)}to{opacity:1;transform:translateX(0) translateY(0) scale(1)}}@keyframes bubbleOut{to{opacity:0;transform:translateY(-10px) scale(.98)}}@keyframes typingDots{50%{box-shadow:12px 0 0 #151713,24px 0 0 rgba(21,23,19,.6)}}.rewardToast{position:absolute;left:50%;top:68px;z-index:30;display:flex;align-items:center;gap:10px;max-width:min(330px,calc(100% - 34px));padding:10px 14px;border-radius:999px;background:rgba(255,253,245,.95);color:#151713;box-shadow:0 18px 48px rgba(0,0,0,.32);font-size:13px;font-weight:850;letter-spacing:0;transform:translateX(-50%) translateY(0);animation:toastIn .2s ease}.rewardToast:before{content:"";width:19px;height:15px;border-radius:4px 4px 8px 8px;background:linear-gradient(#ffe08a,#c58a19);box-shadow:0 5px 0 -2px #a66d15;flex:0 0 auto}.rewardToast.hidden{display:none}@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-9px) scale(.96)}to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}.screen{padding-bottom:92px}.anchor{left:18px;right:auto;bottom:calc(18px + var(--keyboard-lift,0px));align-items:flex-start}.chat{margin-bottom:66px;transform-origin:bottom left;animation:chatPop .2s ease}.chat .log{height:320px;max-height:min(54vh,360px)}@keyframes chatPop{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}@media(max-width:480px){.bottomComposer{left:82px;right:12px;bottom:calc(12px + var(--keyboard-lift,0px))}.quickThread{left:82px;right:12px;bottom:calc(78px + var(--keyboard-lift,0px))}.anchor{left:12px;right:auto;bottom:calc(12px + var(--keyboard-lift,0px))}.screen{padding-bottom:90px}.chat{width:calc(100vw - 28px);margin-bottom:66px}.rewardToast{top:58px}}</style>
</head>
<body>
<div class="stage"><div class="phone" id="phone"><div class="pond"><canvas id="pondCanvas"></canvas></div><div class="waterGlow"></div><header class="top"><button class="pill brandPill" id="switchBtn" type="button">Pond</button><div class="hudRight"><div class="pill coinPill" aria-label="Trophies"><span class="trophyIcon" aria-hidden="true"></span><span id="trophies">0</span></div><div class="pill coinPill" aria-label="Coins"><span class="coinIcon" aria-hidden="true"></span><span id="coins">0</span></div></div></header><div class="rewardToast hidden" id="rewardToast"></div><main class="screens"><section class="screen" id="home"><div class="heroCopy"><h1 id="greeting">Good evening.</h1></div><div class="week" id="week"></div><section class="panel"><div class="panelHead"><h2>Today's Done</h2></div><div class="list" id="doneList"></div></section></section><section class="screen hidden" id="pondScreen"></section></main><div class="quickThread hidden" id="quickThread"></div><form class="doneForm bottomComposer" id="doneForm"><input id="doneInput" placeholder="Tell Grimm what you did. Or argue." autocomplete="off" maxlength="220"><button class="send">Send</button></form><div class="anchor"><section class="chat" id="chat"><div class="log" id="chatLog"></div></section><button class="speech" id="speech" type="button">Pond restored. Tap me if you need the full interrogation.</button><button class="orb" id="orb" type="button" aria-label="Open Grimm"><span class="badge" id="badge"></span></button></div></div></div>
<span id="fedCount" hidden>0</span><span id="foodCount" hidden>0</span>
<script src="app.js"></script>
</body>
</html>
