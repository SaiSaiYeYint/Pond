<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Pond</title>
<style>

/* base */
:root{--deep:#061817; --mid:#0a2e2b; --ink:#f7fbf8; --muted:rgba(247,251,248,.66); --line:rgba(255,255,255,.13); --paper:#fffdf5; --paperText:#151713; --gold:#f2c14e; --red:#ff5145; --shadow:0 24px 70px rgba(0,0,0,.44); --phone-width:min(430px,100vw); --chat-width:min(430px,calc(100vw - 32px)); --dock-width:min(320px,calc(100vw - 110px)); --chat-top:86px; --dock-bottom:48px; --messages-bottom:116px; --dock-shift:36px; --orb-left:-64px}
*{box-sizing:border-box}
html,body{width:100%; height:100%; margin:0; overflow:hidden; position:fixed; inset:0; background:#030706; color:var(--ink); font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; overscroll-behavior:none}
button,input{font:inherit}
button{cursor:pointer}
.stage{width:100vw; height:100vh; height:100lvh; display:block; overflow:hidden; background:#030706}
.phone{position:relative; width:100vw; height:100vh; height:100lvh; min-height:100vh; min-height:100lvh; overflow:hidden; background:var(--deep); isolation:isolate}
/* pondLayer */
.pondLayer{position:absolute; inset:0; z-index:0; pointer-events:auto; overflow:hidden}
.pond,.waterGlow{position:absolute; inset:0}
.pond{background:radial-gradient(circle at 50% 22%,#1b6b60,var(--mid) 48%,var(--deep))}
.pond canvas{width:100%; height:100%; display:block}
.waterGlow{pointer-events:none; background:radial-gradient(circle at 14% 16%,rgba(255,238,182,.22),transparent 35%),radial-gradient(circle at 80% 75%,rgba(170,238,219,.1),transparent 42%),linear-gradient(180deg,rgba(255,255,255,.06),transparent 34%,rgba(0,0,0,.22)); mix-blend-mode:screen}
/* pageLayer */
.pageLayer{position:absolute; inset:0; z-index:10; pointer-events:none; overflow:hidden; transition:opacity .24s ease}
.screens{position:absolute; inset:0; width:var(--phone-width); left:50%; transform:translateX(-50%); pointer-events:none}
.screen{position:absolute; inset:0; display:flex; flex-direction:column; gap:15px; padding:82px 18px 112px; pointer-events:none; transition:opacity .22s ease,transform .22s ease}
.screen>*{pointer-events:auto}
.screen.hidden{opacity:0; transform:translateY(10px) scale(.98); pointer-events:none}
.heroCopy{padding-top:6px; text-shadow:0 2px 14px rgba(0,0,0,.55)}
h1{font-size:28px; line-height:1; margin:0 0 6px; letter-spacing:0}
/* chatLayer */
.chatLayer{position:absolute; inset:0; z-index:100; pointer-events:none; overflow:visible; touch-action:none; --keyboard-lift:0px}
.top{position:absolute; left:50%; top:0; width:var(--phone-width); transform:translateX(-50%); z-index:20; display:flex; align-items:center; justify-content:space-between; gap:10px; padding:16px; background:transparent; pointer-events:auto}
.chatDock{position:absolute; left:calc(50% + var(--dock-shift)); transform:translateX(-50%); bottom:calc(env(safe-area-inset-bottom) + var(--dock-bottom) + var(--keyboard-lift)); z-index:45; width:var(--dock-width); pointer-events:none; transition:bottom .28s cubic-bezier(.2,.8,.2,1)}
.bottomComposer{width:100%; margin:0; display:grid; grid-template-columns:minmax(0,1fr)52px; gap:8px; background:rgba(3,10,9,.68); border:1px solid rgba(255,255,255,.09); border-radius:20px; padding:6px; backdrop-filter:blur(18px); box-shadow:0 18px 46px rgba(0,0,0,.38); pointer-events:auto}
.bottomComposer input{min-height:46px; padding:11px 9px; font-size:16px}
.bottomComposer .send{min-width:52px; padding:0; border-radius:15px}
.bottomComposer.thinking{opacity:.82}
.bottomComposer.thinking .send{color:transparent; position:relative}
.bottomComposer.thinking .send:after{content:""; position:absolute; inset:15px; margin:auto; width:12px; height:12px; border-radius:50%; border:2px solid rgba(20,23,19,.28); border-top-color:#151713; animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}
}
.quickThread{position:absolute; left:50%; bottom:calc(env(safe-area-inset-bottom) + var(--messages-bottom)); z-index:35; width:min(356px,calc(100vw - 44px)); display:flex; flex-direction:column; gap:8px; align-items:stretch; transform:translateX(-50%); pointer-events:none}
.quickThread.hidden{display:none}
.quickThread.leaving .quickBubble.u{animation:bubbleOutSmooth 1.15s ease forwards}
.quickThread.leaving .quickBubble.g{animation:bubbleOutSmooth 1.15s ease .42s forwards}
.anchor{position:absolute; left:50%; transform:translateX(-50%); bottom:calc(env(safe-area-inset-bottom) + var(--messages-bottom)); z-index:30; width:var(--dock-width); display:flex; align-items:stretch; overflow:visible; pointer-events:none; transition:top .28s cubic-bezier(.2,.8,.2,1),bottom .28s cubic-bezier(.2,.8,.2,1)}
.chat{display:none; width:100%; margin:0; border:0; background:transparent; box-shadow:none; overflow:visible}
.chat.open{display:flex; flex-direction:column; pointer-events:auto}
.log{pointer-events:auto; height:auto; max-height:none; display:flex; flex-direction:column; gap:9px; background:transparent; padding:0; overflow-y:auto; overflow-x:hidden; scrollbar-width:none; touch-action:pan-y; -webkit-overflow-scrolling:touch; scroll-behavior:smooth}
.log::-webkit-scrollbar,.list::-webkit-scrollbar{display:none}
.speech{display:none}
.orb{position:absolute; left:var(--orb-left); bottom:0; z-index:45; width:58px; height:58px; border-radius:50%; background:#030605; border:1px solid rgba(255,255,255,.14); box-shadow:0 12px 32px rgba(0,0,0,.42); display:grid; place-items:center; pointer-events:auto}
.orb:before{content:""; width:23px; height:7px; border-radius:999px; background:var(--gold); box-shadow:0 0 15px rgba(242,193,78,.9)}
.orb.talk:before{height:19px; border-radius:50%; animation:stare .22s infinite alternate}
.badge{position:absolute; top:-1px; right:-1px; width:12px; height:12px; border-radius:50%; background:var(--red); display:none; border:2px solid #030605; box-shadow:0 0 0 2px rgba(255,255,255,.1),0 0 14px var(--red)}
@keyframes stare{from{transform:translateX(-1px) scale(1)}
to{transform:translateX(1px) scale(1.08)}
}
/* components */
.pill{border:1px solid rgba(255,255,255,.1); background:rgba(3,10,9,.56); color:var(--ink); backdrop-filter:blur(18px); border-radius:999px; min-height:40px; padding:0 13px; font-size:13px; font-weight:850; box-shadow:0 14px 34px rgba(0,0,0,.22),inset 0 0 0 1px rgba(255,255,255,.03)}
.brandPill{display:grid; place-items:center}
.hudRight{display:flex; align-items:center; gap:8px}
.coinPill{color:var(--gold); display:flex; align-items:center; gap:7px}
.coinIcon,.trophyIcon{width:22px; height:22px; display:inline-grid; place-items:center; position:relative; flex:0 0 auto}
.coinIcon{border-radius:50%; background:radial-gradient(circle at 35% 30%,#fff4b8,#f2c14e 42%,#a66d15); box-shadow:inset 0 0 0 2px rgba(255,255,255,.22),0 0 14px rgba(242,193,78,.24)}
.coinIcon:after{content:""; width:8px; height:8px; border-radius:50%; border:2px solid rgba(80,48,5,.5)}
.trophyIcon:before{content:""; width:16px; height:13px; border-radius:4px 4px 7px 7px; background:linear-gradient(#ffe08a,#c58a19); box-shadow:inset 0 0 0 1px rgba(255,255,255,.25)}
.trophyIcon:after{content:""; position:absolute; bottom:2px; width:18px; height:4px; border-radius:4px; background:#a66d15; box-shadow:0 -5px 0 -1px #c58a19}
input{min-width:0; border:0; outline:0; border-radius:13px; background:transparent; color:var(--ink); line-height:1.2}
input::placeholder{color:rgba(247,251,248,.42)}
.send,.ghost{border:0; border-radius:13px; min-height:42px; padding:0 15px; font-weight:900}
.send{background:var(--paper); color:var(--paperText)}
.week{min-height:86px; display:flex; align-items:center; gap:0; border:1px solid rgba(255,255,255,.14); border-radius:28px; padding:14px 18px; background:rgba(5,22,20,.48); box-shadow:0 22px 54px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.07); backdrop-filter:blur(18px)}
.day{position:relative; flex:1 1 0; min-width:0; display:grid; justify-items:center; gap:8px; color:rgba(247,251,248,.48); font-size:12px; font-weight:900}
.day:not(:last-child):after{content:""; position:absolute; top:18px; left:calc(50% + 19px); width:calc(100% - 38px); height:3px; border-radius:999px; background:rgba(255,255,255,.14)}
.day.done{color:var(--ink)}
.day.done:not(:last-child):after{background:rgba(255,81,69,.64); box-shadow:0 0 14px rgba(255,81,69,.26)}
.dot{width:38px; height:38px; border-radius:50%; display:grid; place-items:center; border:1px solid rgba(255,255,255,.13); background:rgba(255,255,255,.065); color:transparent; font-size:0}
.day.done .dot{background:rgba(255,81,69,.14); border-color:rgba(255,81,69,.9); box-shadow:0 0 22px rgba(255,81,69,.2),inset 0 0 0 1px rgba(255,81,69,.26)}
.day.done .dot:before{content:"\00d7"; color:#ff5145; font-size:42px; font-weight:1000; line-height:.7; transform:rotate(-10deg) translateY(-1px); text-shadow:0 0 14px rgba(255,81,69,.34)}
.panel{border-radius:26px; background:rgba(5,22,20,.46); border:1px solid rgba(255,255,255,.13); box-shadow:0 22px 54px rgba(0,0,0,.24),inset 0 1px 0 rgba(255,255,255,.07); backdrop-filter:blur(16px); overflow:hidden}
.panelHead{display:flex; align-items:center; justify-content:space-between; padding:15px 16px 11px}
.panelHead h2{margin:0; font-size:18px; font-weight:900; color:#f7fbf8; text-shadow:0 2px 16px rgba(0,0,0,.42)}
.list{height:215px; max-height:215px; display:grid; align-content:start; gap:0; padding:0 14px 14px; overflow-y:auto; scrollbar-width:none; touch-action:pan-y; -webkit-overflow-scrolling:touch}
.empty{background:rgba(255,255,255,.065); border:1px solid rgba(255,255,255,.1); border-radius:14px; color:rgba(247,251,248,.78); padding:12px 13px; font-size:12px; font-weight:760}
.doneCard{min-height:56px; display:grid; grid-template-columns:minmax(0,1fr) auto; gap:12px; align-items:center; background:rgba(255,255,255,.025); border-top:1px solid rgba(255,255,255,.08); padding:9px 4px}
.doneCard:first-child{border-top:0}
.doneLine{display:inline-block; max-width:100%; width:max-content; min-width:0; padding:9px 16px; border-radius:999px; background:rgba(3,8,8,.78); color:#fffdf5; font-size:15px; font-weight:900; line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-shadow:0 2px 12px rgba(0,0,0,.42)}
.bonus{min-width:58px; height:36px; display:grid; place-items:center; padding:0 14px; border-radius:999px; background:rgba(255,253,245,.96); color:#e49a05; font-size:17px; font-weight:1000; text-align:center}
.bonus.bad{color:#ff5145}
.bonus.zero{background:rgba(255,253,245,.72); color:rgba(21,23,19,.55)}
.quickBubble,.bubble{max-width:76%; border-radius:16px; padding:9px 12px; font-size:13px; font-weight:760; line-height:1.32; box-shadow:0 13px 36px rgba(0,0,0,.28); animation-duration:.34s}
.quickBubble.u,.bubble.u{align-self:flex-end; background:rgba(255,253,245,.96); color:#151713; border:1px solid rgba(255,255,255,.72); border-bottom-right-radius:6px; transform-origin:bottom right; animation:userBubbleIn .34s cubic-bezier(.18,.9,.22,1)}
.quickBubble.g,.bubble.g{align-self:flex-start; background:rgba(3,8,8,.94); color:#f4fbf8; border:1px solid rgba(255,255,255,.1); border-bottom-left-radius:6px; transform-origin:bottom left; animation:grimmBubbleIn .3s cubic-bezier(.18,.9,.22,1)}
.quickBubble{white-space:normal; overflow:visible; text-overflow:clip}
.quickBubble.typing,.bubble.typing{align-self:flex-start; width:50px; max-width:50px; min-width:50px; height:32px; min-height:32px; margin:0; padding:0; color:transparent; font-size:0; line-height:0; position:relative; overflow:hidden}
.quickBubble.typing:before,.bubble.typing:before{content:""; position:absolute; left:12px; top:50%; width:6px; height:6px; border-radius:50%; background:#f7fbf8; box-shadow:10px 0 0 rgba(247,251,248,.64),20px 0 0 rgba(247,251,248,.36); animation:typingDots 1s infinite ease-in-out; transform:translateY(-50%)}
@keyframes userBubbleIn{from{opacity:0; transform:translateY(46px) scale(.78)}
to{opacity:1; transform:translateY(0) scale(1)}
}
@keyframes grimmBubbleIn{from{opacity:0; transform:translateX(-12px) translateY(10px) scale(.88)}
to{opacity:1; transform:translateX(0) translateY(0) scale(1)}
}
@keyframes bubbleOutSmooth{to{opacity:0; transform:translateY(-14px) scale(.985); filter:blur(1px)}
}
@keyframes typingDots{50%{box-shadow:10px 0 0 #f7fbf8,20px 0 0 rgba(247,251,248,.64)}
}
.decisionRow{align-self:flex-start; display:flex; gap:8px; margin:2px 0 4px}
.decisionRow button{border:1px solid rgba(105,210,255,.36); background:rgba(10,28,39,.86); color:#dff7ff; border-radius:999px; min-height:34px; min-width:66px; padding:0 15px; font-size:12px; font-weight:1000; letter-spacing:.4px}
.decisionRow button:first-child{background:#dff7ff; color:#081923}
.rewardToast{position:absolute; left:50%; top:68px; z-index:50; display:flex; align-items:center; gap:10px; max-width:min(330px,calc(100% - 34px)); padding:10px 14px; border-radius:999px; background:rgba(255,253,245,.95); color:#151713; box-shadow:0 18px 48px rgba(0,0,0,.32); font-size:13px; font-weight:850; transform:translateX(-50%)}
.rewardToast.hidden{display:none}
.float{position:absolute; z-index:8; color:var(--gold); font-weight:1000; text-shadow:0 2px 8px #000; pointer-events:none; animation:rise 1.1s forwards}
@keyframes rise{0%{opacity:0; transform:translateY(0) scale(.8)}
20%{opacity:1}
100%{opacity:0; transform:translateY(-54px) scale(.95)}
}
/* states */
.phone.pondOnly[data-chat-state="minimized"] .pageLayer{opacity:0; visibility:hidden; pointer-events:none}
.phone[data-chat-state="minimized"] .chat{display:none}
.phone[data-chat-state="minimized"] .pageLayer{opacity:1; visibility:visible; pointer-events:none}
.phone[data-chat-state="minimized"] .chatLayer>*{pointer-events:none}
.phone[data-chat-state="minimized"] .top,.phone[data-chat-state="minimized"] .chatDock,.phone[data-chat-state="minimized"] .anchor{pointer-events:auto}
.phone[data-chat-state="minimized"] .orb{bottom:0}
.phone[data-chat-state="maximized"] .pageLayer,.phone[data-chat-state="keyboard"] .pageLayer{opacity:0; visibility:hidden; pointer-events:none}
.phone[data-chat-state="maximized"] .quickThread,.phone[data-chat-state="keyboard"] .quickThread{display:none}
.phone[data-chat-state="maximized"] .anchor{left:50%; width:var(--chat-width); top:var(--chat-top); bottom:calc(env(safe-area-inset-bottom) + var(--messages-bottom))}
.phone[data-chat-state="keyboard"] .anchor{left:50%; width:var(--chat-width); top:var(--chat-top); bottom:calc(env(safe-area-inset-bottom) + var(--messages-bottom) + var(--keyboard-lift))}
.phone[data-chat-state="maximized"] .chatDock,.phone[data-chat-state="keyboard"] .chatDock{pointer-events:auto}
.phone[data-chat-state="maximized"] .chat,.phone[data-chat-state="keyboard"] .chat{display:flex; height:100%; flex-direction:column; align-items:center; width:100%}
.phone[data-chat-state="maximized"] .log,.phone[data-chat-state="keyboard"] .log{height:100%; padding:0 0 12px; width:100%}
.phone[data-chat-state="keyboard"] .log{padding-bottom:18px}
.phone[data-chat-state="maximized"] .top,.phone[data-chat-state="keyboard"] .top{opacity:0; visibility:hidden; pointer-events:none}
.phone.workMode .bubble.g,.phone.workMode .quickBubble.g{background:rgba(3,8,8,.94); color:#f4fbf8; border-color:rgba(255,255,255,.1)}
/* responsive */
@media(max-width:480px){
:root{--chat-width:calc(100vw - 32px); --dock-width:calc(100vw - 110px); --chat-top:86px; --dock-bottom:48px; --messages-bottom:116px; --dock-shift:34px}.screen{padding:76px 14px 106px}
.chatDock{left:calc(50% + var(--dock-shift)); transform:translateX(-50%); width:var(--dock-width)}
.anchor{left:50%; transform:translateX(-50%); width:var(--dock-width)}
.quickThread{width:min(344px,calc(100vw - 34px)); bottom:calc(env(safe-area-inset-bottom) + var(--messages-bottom))}
.phone[data-chat-state="maximized"] .anchor,.phone[data-chat-state="keyboard"] .anchor{width:var(--chat-width)}
.week{min-height:80px; padding:13px}
.day{font-size:11px; gap:7px}
.dot{width:34px; height:34px}
.day:not(:last-child):after{top:16px; left:calc(50% + 17px); width:calc(100% - 34px)}
.day.done .dot:before{font-size:38px}
.list{height:196px; max-height:196px; padding:0 12px 12px}
.doneCard{min-height:52px}
.doneLine{font-size:14px; padding:8px 14px}
.bonus{min-width:54px; height:34px; font-size:16px}
}

</style></head>
<body>
<div class="stage"><div class="phone" id="phone" data-chat-state="minimized"><div class="pondLayer" id="pondLayer"><div class="pond"><canvas id="pondCanvas"></canvas></div><div class="waterGlow"></div></div><main class="pageLayer" id="pageLayer"><div class="screens"><section class="screen" id="home"><div class="heroCopy"><h1 id="greeting">Good evening.</h1></div><div class="week" id="week"></div><section class="panel"><div class="panelHead"><h2>Today's Done</h2></div><div class="list" id="doneList"></div></section></section><section class="screen hidden" id="pondScreen"></section></div></main><section class="chatLayer" id="chatLayer"><header class="top"><button class="pill brandPill" id="switchBtn" type="button">Pond</button><div class="hudRight"><div class="pill coinPill" aria-label="Trophies"><span class="trophyIcon" aria-hidden="true"></span><span id="trophies">0</span></div><div class="pill coinPill" aria-label="Coins"><span class="coinIcon" aria-hidden="true"></span><span id="coins">0</span></div></div></header><div class="rewardToast hidden" id="rewardToast"></div><div class="quickThread hidden" id="quickThread"></div><div class="anchor"><section class="chat" id="chat"><div class="log" id="chatLog"></div></section><button class="speech" id="speech" type="button">Pond restored. Tap me if you need the full interrogation.</button></div><div class="chatDock" id="chatDock"><button class="orb" id="orb" type="button" aria-label="Open Grimm"><span class="badge" id="badge"></span></button><form class="doneForm bottomComposer" id="doneForm"><input id="doneInput" placeholder="Say something to Grimm." autocomplete="off" maxlength="220"><button class="send">Send</button></form></div></section></div></div>
<span id="fedCount" hidden>0</span><span id="foodCount" hidden>0</span>
<script src="app.js"></script>
</body>
</html>
