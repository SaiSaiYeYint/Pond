<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grimm Lab</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #07120f;
      color: #f3f7f3;
    }
    main {
      width: min(980px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }
    h1 { margin: 0 0 20px; font-size: 28px; }
    .status {
      display: grid;
      gap: 6px;
      margin: 0 0 20px;
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      background: rgba(255,255,255,.06);
      color: #c8d8d2;
      font-weight: 700;
    }
    label { display: grid; gap: 8px; margin: 16px 0; font-weight: 700; }
    textarea, select, button, pre {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 10px;
      font: inherit;
    }
    textarea, select {
      width: 100%;
      background: rgba(255,255,255,.08);
      color: #f3f7f3;
      padding: 12px 14px;
    }
    textarea { min-height: 130px; resize: vertical; }
    select { max-width: 220px; }
    button {
      margin: 8px 0 24px;
      padding: 12px 18px;
      background: #f6f2e8;
      color: #07120f;
      font-weight: 800;
      cursor: pointer;
    }
    section { margin: 18px 0; }
    h2 { font-size: 15px; margin: 0 0 8px; color: #c8d8d2; }
    pre {
      min-height: 72px;
      white-space: pre-wrap;
      word-break: break-word;
      background: rgba(0,0,0,.38);
      padding: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Grimm Lab</h1>
    <div class="status" id="providerStatus">Provider status: checking...</div>
    <form id="labForm">
      <label>
        System Prompt
        <textarea id="systemPrompt" placeholder="Optional. Empty uses Grimm Constitution."></textarea>
      </label>
      <label>
        User Message
        <textarea id="userMessage" required placeholder="Say something to test the provider."></textarea>
      </label>
      <label>
        Provider
        <select id="provider">
          <option value="gemini">Gemini</option>
          <option value="ollama" selected>Ollama</option>
        </select>
      </label>
      <button id="sendBtn" type="submit">Send</button>
    </form>

    <section>
      <h2>Raw Provider Response</h2>
      <pre id="rawOutput"></pre>
    </section>
    <section>
      <h2>Validated Response</h2>
      <pre id="validatedOutput"></pre>
    </section>
    <section>
      <h2>Final Grimm Reply</h2>
      <pre id="replyOutput"></pre>
    </section>
    <section>
      <h2>Errors</h2>
      <pre id="errorOutput"></pre>
    </section>
  </main>

  <script>
    const form = document.getElementById("labForm");
    const sendBtn = document.getElementById("sendBtn");
    const rawOutput = document.getElementById("rawOutput");
    const validatedOutput = document.getElementById("validatedOutput");
    const replyOutput = document.getElementById("replyOutput");
    const errorOutput = document.getElementById("errorOutput");
    const providerStatus = document.getElementById("providerStatus");
    const providerSelect = document.getElementById("provider");

    function renderStatus(status) {
      if (!status) {
        providerStatus.textContent = "Provider status: unknown";
        return;
      }
      providerStatus.textContent = `Provider: ${status.activeProvider} | Model: ${status.model} | Health: ${status.health}`;
    }

    async function refreshStatus() {
      try {
        const response = await fetch(`/api/lab?provider=${encodeURIComponent(providerSelect.value)}`);
        const data = await response.json();
        renderStatus(data.status);
      } catch (error) {
        providerStatus.textContent = "Provider status: unavailable";
      }
    }

    form.addEventListener("submit", async event => {
      event.preventDefault();
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";
      rawOutput.textContent = "";
      validatedOutput.textContent = "";
      replyOutput.textContent = "";
      errorOutput.textContent = "";
      try {
        const response = await fetch("/api/lab", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            systemPrompt: document.getElementById("systemPrompt").value,
            userMessage: document.getElementById("userMessage").value,
            provider: document.getElementById("provider").value
          })
        });
        const data = await response.json();
        renderStatus(data.status);
        rawOutput.textContent = data.rawProviderResponse || "";
        validatedOutput.textContent = data.validatedResponse ? JSON.stringify(data.validatedResponse, null, 2) : "";
        replyOutput.textContent = data.finalGrimmReply || "";
        errorOutput.textContent = data.error || "";
      } catch (error) {
        errorOutput.textContent = error instanceof Error ? error.message : String(error);
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
      }
    });
    providerSelect.addEventListener("change", refreshStatus);
    refreshStatus();
  </script>
</body>
</html>
